<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/media/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <title>Yet Another QR code Generator Website</title>
</head>
<style>
    html, body {
        height: 100%;
    }

    div { /* DEBUG */
        border-color: black;
        border-style: solid;
    }
</style>
<body class="d-flex flex-column flex-grow-1">
    <!-- Navigation/home bar -->
    <nav class="navbar bg-info">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="/media/logo.png" alt="Logo" width="30" height="24"
                    class="d-inline-block align-text-top">
                Yet Another QR code Generator Website
            </a>
        </div>
    </nav>

    <!-- The rest of the page -->
    <div class="container-fluid text-center flex-grow-1"> <!-- FIXME: The div is supposed to fully grow to the bottom of the page, but instead is limited to it's filled content -->
        <div class="row">
            <!-- Parameters -->
            <div class="col bg-info-subtle">
                <div class="accordion m-3" id="parametersList">
                    <div class="accordion-item m-2">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne"
                                aria-expanded="true" aria-controls="collapseOne">
                                [1] — QR code content
                            </button>
                        </h2>
                        <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#parametersList">
                            <!-- Content type menu -->
                            <div class="accordion-body">
                                <h1>Placeholder content-type menu</h1>
                            </div>
                        </div>
                    </div>
                    <div class="accordion-item m-2">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                                [2] — Customization
                            </button>
                        </h2>
                        <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#parametersList">
                            <!-- Customization settings menu -->
                            <div class="accordion-body">
                                <h1>Placeholder customization settings</h1>
                            </div>
                        </div>
                    </div>
                    <div class="accordion-item m-2">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                data-bs-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree">
                                [3] — QR code settings
                            </button>
                        </h2>
                        <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#parametersList">
                            <!-- QR code settings menu -->
                            <div class="accordion-body">
                                <h1>Placeholder extra settings</h1>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main display -->
            <div class="col-12 col-md-6">
                <div class="m-3">
                    <h1>Body content</h1>
                </div>
            </div>

            <!-- QR code history -->
            <div class="col bg-info-subtle">
                <div class="m-3">
                    <h1>Placeholder history</h1>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
