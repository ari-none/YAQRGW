<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/media/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>Yet Another QR code Generator Website</title>
</head>
<body>
    <div class="container-fluid text-center d-flex h-100 flex-column">
        <!-- Navigation/home bar -->
        <div class="row">
            <nav class="navbar bg-info">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">
                        <img src="/media/logo.png" alt="Logo" width="30" height="24"
                            class="d-inline-block align-text-top">
                        Yet Another QR code Generator Website
                    </a>
                </div>
            </nav>
        </div>
        
        <!-- The rest of the page -->
        <div class="row flex-grow-1">
            <!-- Parameters -->
            <div class="col bg-info-subtle portlet">
                <div class="accordion m-3" id="parametersList">
                    <div class="accordion-item m-2">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne"
                                aria-expanded="true" aria-controls="collapseOne">
                                [1] — QR code content
                            </button>
                        </h2>
                        <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#parametersList">
                            <!-- Content type menu -->
                            <div class="accordion-body">

                                <label class="form-label" for="qrcodeContentValue">Fill in the link or text you'd like the QR code to have. (full link required)</label>
                                <input class="form-control" type="text" placeholder="Type here…" id="qrcodeContentValue">
                                <br>

                                <div class="form-control text-start">
                                    <p><b class="small">Here's an example list of URIs (link prefixes) you can use:</b></p>
                                    <br>
                                    <p class="small">http/https: (for links)</p>
                                    <p class="small">tel: (for phone numbers)</p>
                                    <p class="small">mailto: (for email addresses)</p>
                                    <p class="small">ftp: (for ftp servers)</p>
                                </div>

                            </div>
                        </div>
                    </div>
                    <div class="accordion-item m-2">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
                                [2] — Customization
                            </button>
                        </h2>
                        <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#parametersList">
                            <!-- Customization settings menu -->
                            <div class="accordion-body">

                                <h1>Placeholder customization settings</h1>

                            </div>
                        </div>
                    </div>
                    <div class="accordion-item m-2">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                data-bs-target="#collapseThree" aria-expanded="false" aria-controls="collapseThree">
                                [3] — QR code settings
                            </button>
                        </h2>
                        <div id="collapseThree" class="accordion-collapse collapse" data-bs-parent="#parametersList">
                            <!-- QR code settings menu -->
                            <div class="accordion-body">

                                <h1>Placeholder extra settings</h1>

                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main display -->
            <div class="col-12 col-lg-6">
                <div class="m-3">
                    
                    <h1>Output</h1>

                    <img src="media/placeholder.png" alt="Generated QR code" class="form-control m-3" id="qrcodeOutputImage">

                    <input type="button" class="btn btn-info" value="Generate the QR code!" id="qrcodeGenerateButton">

                </div>
            </div>

            <!-- QR code history -->
            <div class="col bg-info-subtle">
                <div class="m-3">
                    <h1>Placeholder history</h1> <!-- TODO: Finish the placeholder section for this -->
                </div>
            </div>
        </div>
    </div>
</body>
</html>
